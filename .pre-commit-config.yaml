# Secret-scanning guard. Install once:  pipx install pre-commit && pre-commit install
# Runs gitleaks on every commit and blocks anything that looks like a secret.
repos:
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.18.4
    hooks:
      - id: gitleaks
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: detect-private-key
      - id: check-added-large-files
        args: ["--maxkb=1024"]
